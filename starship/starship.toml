# Use the color palette
palette = "dracula"


#format = """$character"""
right_format = """$java"""

[cmd_duration]
style = "bold yellow"

[git_branch]
style = "bold pink"

[git_status]
style = "bold red"

[hostname]
style = "bold purple"

[username]
format = "[$user]($style) on "
style_user = "bold cyan"

[directory]
truncation_length = 6
truncate_to_repo = false
style = "bold green"

[gradle]
format = '[\[${symbol}(${version})\] ]($style)'
version_format = '${raw}'
symbol = 'G'

[java]
format = '[\[${symbol}(${version})\] ]($style)'
version_format = '${raw}'
style = 'bold red'

[kotlin]
format = '[\[${symbol}(${version})\] ]($style)'
version_format = '${raw}'
symbol = 'Kt'


[python]
format = '[\[${symbol}(${version})\] ]($style)'
version_format = '${raw}'
# symbol = 'Py'

# Define Dracula color palette
[palettes.dracula]
background = "#282a36"
current_line = "#44475a"
foreground = "#f8f8f2"
comment = "#6272a4"
cyan = "#8be9fd"
green = "#50fa7b"
orange = "#ffb86c"
pink = "#ff79c6"
purple = "#bd93f9"
red = "#ff5555"
yellow = "#f1fa8c"
